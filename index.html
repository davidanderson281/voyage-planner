<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="VoyagePlanner - A premium, modern web application for organizing, planning, and budget tracking multiple holidays and travel ideas." />
    
    <!-- FOUC Protection & Theme Synchronizer -->
    <script>
      {
        const colorScheme = localStorage.getItem("color-scheme") || "dark";
        document.documentElement.setAttribute("data-theme", colorScheme);
        const meta = document.querySelector('meta[name="color-scheme"]');
        if (meta) {
          meta.content = colorScheme === "dark" ? "dark" : "light";
        }
      }
    </script>

    <title>VoyagePlanner — Premium Holiday & Travel Dashboard</title>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
